<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories Layout</title>
    <link rel="stylesheet" href="jd.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="hero-container">
        <div class="panel panel-1">
            <div class="overlay"></div>
            <div class="content">
                <div class="category-icon">🎮</div> 
                <h2>Gaming /<br>Streaming</h2>
                <div class="divider"></div>
                <div class="app-logos">
                    <div class="logo-placeholder" style="background-color: #ff4500;"></div>
                    <div class="logo-placeholder" style="background-color: #4caf50;"></div>
                    <div class="logo-placeholder" style="background-color: #f44336;"></div>
                    <div class="logo-placeholder" style="background-color: #ffeb3b;"></div>
                </div>
            </div>
        </div>

        <div class="panel panel-2">
            <div class="overlay"></div>
            <div class="content">
                <div class="category-icon">📂</div> 
                <h2>Content<br>Creation</h2>
                <div class="divider"></div>
                <div class="app-logos">
                    <div class="logo-placeholder" style="background-color: #00a8ff;"></div>
                    <div class="logo-placeholder" style="background-color: #9c88ff;"></div>
                    <div class="logo-placeholder" style="background-color: #fbc531;"></div>
                    <div class="logo-placeholder" style="background-color: #e1b12c;"></div>
                </div>
            </div>
        </div>

        <div class="panel panel-3">
            <div class="overlay"></div>
            <div class="content">
                <div class="category-icon">📐</div> 
                <h2>Engineering<br>Works</h2>
                <div class="divider"></div>
                <div class="app-logos">
                    <div class="logo-placeholder" style="background-color: #e84118;"></div>
                    <div class="logo-placeholder" style="background-color: #0097e6;"></div>
                    <div class="logo-placeholder" style="background-color: #c23616;"></div>
                    <div class="logo-placeholder" style="background-color: #f5f6fa;"></div>
                </div>
            </div>
        </div>

        <div class="panel panel-4">
            <div class="overlay"></div>
            <div class="content">
                <div class="category-icon">🗂️</div> 
                <h2>Data Science<br>and others</h2>
                <div class="divider"></div>
                <div class="app-logos">
                    <div class="logo-placeholder" style="background-color: #ffffff;"></div>
                    <div class="logo-placeholder" style="background-color: #3742fa;"></div>
                    <div class="logo-placeholder" style="background-color: #ffa502;"></div>
                    <div class="logo-placeholder" style="background-color: #ff7f50;"></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
